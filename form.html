<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천주교 대구대교구 하양본당 신앙학교 참가 신청서</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-bottom: 5px; }
        label { display: block; font-weight: bold; color: #34495e; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: white; }
        .readonly-input { background-color: #eee; cursor: not-allowed; color: #555; }
        textarea { resize: vertical; height: 80px; font-family: inherit; }
        button { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 25px; }
        button:hover { background-color: #27ae60; }
        .msg { text-align: center; margin-top: 20px; font-weight: bold; color: #2c3e50; font-size: 18px; line-height: 1.6; }
        #waitStatus { font-size: 15px; color: #3498db; background: #eaf2f8; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        #timerDisplay { display: block; font-size: 36px; color: #e74c3c; font-weight: bold; letter-spacing: 2px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 신앙학교 참가 신청서</h1>
    
    <div id="waitStatus">현재 상태를 불러오는 중...</div>

    <div id="formContainer">
        <label>👤 학생 이름</label>
        <input type="text" id="name" class="readonly-input" readonly>

        <label>📱 학생 연락처</label>
        <input type="text" id="phone" class="readonly-input" readonly>

        <label>✨ 세례명</label>
        <input type="text" id="baptismalName" placeholder="없으면 '없음' 입력">
        
        <label>🏫 소속 및 학년</label>
        <select id="grade">
            <option value="">선택하세요</option>
            <optgroup label="초등부"><option value="초등 3학년">초등 3학년</option><option value="초등 4학년">초등 4학년</option><option value="초등 5학년">초등 5학년</option><option value="초등 6학년">초등 6학년</option></optgroup>
            <optgroup label="중등부"><option value="중등 1학년">중등 1학년</option><option value="중등 2학년">중등 2학년</option><option value="중등 3학년">중등 3학년</option></optgroup>
            <optgroup label="고등부"><option value="고등 1학년">고등 1학년</option><option value="고등 2학년">고등 2학년</option><option value="고등 3학년">고등 3학년</option></optgroup>
        </select>

        <label>🛡️ 보험 가입용 주민등록번호</label>
        <input type="text" id="rrn" placeholder="000000-0000000" maxlength="14" oninput="formatRRN(this)">
        
        <label>👨‍👩‍👦 보호자 연락처</label>
        <input type="text" id="parentPhone" placeholder="예: 010-5678-1234">

        <label>💊 기타 특이사항</label>
        <textarea id="specialNote" placeholder="특이사항이 없다면 '없음'이라고 적어주세요."></textarea>

        <label>💬 비고</label>
        <textarea id="remarks" placeholder="기타 건의사항"></textarea>

        <button onclick="submitApplication()">신청서 최종 제출하기</button>
    </div>
    
    <div id="resultMessage" class="msg"></div>
</div>

<script>
    // 1. 데이터 불러오기: 로컬 스토리지 또는 URL 파라미터 우선순위 적용
    window.onload = function() {
        const savedName = localStorage.getItem('tempName');
        const savedPhone = localStorage.getItem('tempPhone');
        const urlParams = new URLSearchParams(window.location.search);
        
        document.getElementById('name').value = savedName || urlParams.get('name') || '';
        document.getElementById('phone').value = savedPhone || urlParams.get('phone') || '';
    };

    // 2. 상태 체크 루프
    function checkTimeLoop() {
        fetch('/api/waiting') 
            .then(res => res.json())
            .then(data => {
                const { waitingList, settings } = data;
                const now = new Date().getTime();
                const start = new Date(settings.startTime).getTime();
                const end = new Date(settings.endTime).getTime();
                
                const waitStatus = document.getElementById('waitStatus');
                const formContainer = document.getElementById('formContainer');

                if (!settings.isOpen || now > end) {
                    formContainer.style.display = 'none';
                    waitStatus.style.color = '#e74c3c';
                    waitStatus.style.background = '#fdedec';
                    waitStatus.innerText = "신청 기간이 종료되었습니다.";
                    return;
                }

                if (now < start) {
                    formContainer.style.display = 'none'; 
                    waitStatus.style.color = '#e67e22';
                    waitStatus.style.background = '#fef5e7';
                    const dist = start - now;
                    const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((dist % (1000 * 60)) / 1000);
                    waitStatus.innerHTML = `⏳ 신청 시작 대기 중<br><span id="timerDisplay">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span><br>시간이 되면 자동으로 신청서가 열립니다.`;
                } else {
                    formContainer.style.display = 'block'; 
                    waitStatus.style.color = '#3498db';
                    waitStatus.style.background = '#eaf2f8';
                    const finalSubmits = waitingList.filter(a => a.isPreRegistered === false).length;
                    const capacity = settings.capacity;
                    waitStatus.innerText = finalSubmits < capacity ? 
                        `🟢 현재 최종 접수 인원: ${finalSubmits} / ${capacity} (접수 가능)` : 
                        `🟡 정원 마감 | 현재 선착순 대기자: ${finalSubmits - capacity}명`;
                }
            })
            .catch(() => document.getElementById('waitStatus').innerText = "서버 연결 상태 불안정..");
    }

    checkTimeLoop();
    setInterval(checkTimeLoop, 1000);

    // 3. 주민번호 자동 포맷팅
    function formatRRN(obj) {
        let val = obj.value.replace(/[^0-9]/g, "");
        if (val.length > 6) obj.value = val.substring(0, 6) + "-" + val.substring(6, 13);
        else obj.value = val;
    }

    // 4. 최종 제출
    function submitApplication() {
        const data = { 
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            baptismalName: document.getElementById('baptismalName').value.trim(),
            grade: document.getElementById('grade').value,
            rrn: document.getElementById('rrn').value.trim(),
            parentPhone: document.getElementById('parentPhone').value.trim(),
            specialNote: document.getElementById('specialNote').value.trim(),
            remarks: document.getElementById('remarks').value.trim(),
            isPreRegistered: false 
        };

        if(!data.name || !data.phone || !data.baptismalName || !data.grade || !data.rrn || !data.parentPhone) {
            alert('모든 필수 항목을 입력해주세요!');
            return;
        }

        fetch('/api/waiting', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(() => {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('waitStatus').style.display = 'none';
            document.getElementById('resultMessage').innerHTML = `🎉 신청서 제출이 성공적으로 완료되었습니다!`;
        })
        .catch(() => alert('신청 등록에 실패했습니다.'));
    }
</script>
</body>
</html>
