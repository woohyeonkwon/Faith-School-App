<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; }
        .section-waiting { border-left: 5px solid #e67e22; }
        .section-complete { border-left: 5px solid #2ecc71; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
        .btn-red { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-green { background-color: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 관리자 대시보드</h1>
    <div class="section">
        <h2>⚙️ 환경 설정</h2>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <div><label>제목</label><input type="text" id="titleInput"></div>
            <div><label>웨이팅 날짜</label><input type="date" id="dateInput"></div>
            <div><label>시작 시간</label><input type="datetime-local" id="startTime"></div>
            <div><label>종료 시간</label><input type="datetime-local" id="endTime"></div>
            <div><label>정원</label><input type="number" id="capacity"></div>
            <div><label>로고 업로드</label><input type="file" id="logoFile" onchange="uploadLogo()"></div>
            <div><label>상태</label><select id="isOpen"><option value="true">신청 가능</option><option value="false">중지</option></select></div>
        </div>
        <div style="margin-top:15px;">
            <button onclick="saveSettings()" style="background:#3498db;">저장하기</button>
            <button onclick="downloadExcel()" class="btn-green">📥 엑셀 다운로드</button>
            <button onclick="resetAllData()" style="background:#e74c3c;">🚨 데이터 초기화</button>
        </div>
    </div>

    <div class="section section-waiting">
        <h2>대기실 현황</h2>
        <table>
            <thead><tr><th>ID</th><th>이름</th><th>연락처</th><th>등록시간</th><th>관리</th></tr></thead>
            <tbody id="waitingTableBody"></tbody>
        </table>
    </div>

    <div class="section section-complete">
        <h2>신청자 현황 (최종)</h2>
        <table>
            <thead><tr><th>순번</th><th>이름</th><th>연락처</th><th>세례명</th><th>학년</th><th>주민번호</th><th>보호자폰</th><th>특이사항</th><th>제출시간</th><th>관리</th></tr></thead>
            <tbody id="completeTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function loadLiveDashboard() {
        fetch('/api/waiting').then(res => res.json()).then(data => {
            const wBody = document.getElementById('waitingTableBody');
            const cBody = document.getElementById('completeTableBody');
            wBody.innerHTML = ''; cBody.innerHTML = '';
            
            let seq = 1; // 순번 카운터

            data.waitingList.forEach(item => {
                if (item.isPreRegistered === true) {
                    wBody.innerHTML += `<tr><td>${item.id}</td><td>${item.name}</td><td>${item.phone}</td><td>${item.created_at}</td><td><button class="btn-red" onclick="deleteApplicant(${item.id})">삭제</button></td></tr>`;
                } else {
                    cBody.innerHTML += `<tr>
                        <td>${seq++}</td>
                        <td>${item.name}</td><td>${item.phone}</td><td>${item.baptismalName || '-'}</td>
                        <td>${item.grade || '-'}</td><td>${item.rrn || '-'}</td><td>${item.parentPhone || '-'}</td>
                        <td>${item.specialNote || '-'}</td><td>${item.created_at}</td>
                        <td><button class="btn-red" onclick="deleteApplicant(${item.id})">삭제</button></td>
                    </tr>`;
                }
            });
        });
    }

    function downloadExcel() {
        fetch('/api/waiting').then(res => res.json()).then(data => {
            let csv = "\uFEFF순번,이름,연락처,세례명,학년,주민번호,보호자폰,특이사항,제출시간\n";
            let seq = 1;
            data.waitingList.forEach(i => {
                if(!i.isPreRegistered) {
                    csv += `${seq++},${i.name},${i.phone},${i.baptismalName||''},${i.grade||''},${i.rrn||''},${i.parentPhone||''},${i.specialNote||''},${i.created_at}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "신청명단.csv";
            link.click();
        });
    }

    // 설정 로드
    fetch('/api/settings').then(res => res.json()).then(s => {
        document.getElementById('titleInput').value = s.title;
        document.getElementById('dateInput').value = s.waitingDate;
        document.getElementById('capacity').value = s.capacity;
        document.getElementById('startTime').value = s.startTime;
        document.getElementById('endTime').value = s.endTime;
        document.getElementById('isOpen').value = String(s.isOpen);
        loadLiveDashboard();
    });

    function saveSettings() {
        fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
            title: document.getElementById('titleInput').value,
            waitingDate: document.getElementById('dateInput').value,
            capacity: document.getElementById('capacity').value,
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            isOpen: document.getElementById('isOpen').value === 'true'
        }) }).then(() => alert('저장되었습니다.'));
    }

    function uploadLogo() {
        const file = document.getElementById('logoFile').files[0];
        if(!file) return;
        const formData = new FormData();
        formData.append('logo', file);
        fetch('/api/upload-logo', { method: 'POST', body: formData }).then(() => alert('로고 저장 완료!'));
    }

    function deleteApplicant(id) {
        if(confirm('정말 삭제하시겠습니까?')) {
            fetch('/api/delete-patient', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) }).then(loadLiveDashboard);
        }
    }

    function resetAllData() {
        if(confirm('모든 데이터를 초기화하시겠습니까?')) fetch('/api/reset', { method: 'POST' }).then(() => location.reload());
    }

    setInterval(loadLiveDashboard, 2000);
</script>
</body>
</html>
